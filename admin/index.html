<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyumba Klasik - Admin</title>
</head>
<body>
  <script>
    window.CMS_CONFIG = {
      backend: {
        name: 'github',
        repo: 'mdolugome-bot/NYUMBA-KLASIK',
        branch: 'main',
      },
      media_folder: 'images',
      public_folder: '/images',
      collections: [
        {
          name: 'site',
          label: 'Website Content',
          files: [
            {
              file: 'site.json',
              label: 'Main Settings',
              name: 'settings',
              fields: [
                { label: 'Site Title', name: 'title', widget: 'string' },
                { label: 'Meta Description', name: 'description', widget: 'text' },
                { label: 'Meta Keywords', name: 'keywords', widget: 'string' },
                { label: 'Email', name: 'email', widget: 'string' },
                { label: 'Phone', name: 'phone', widget: 'string' },
                { label: 'WhatsApp Number', name: 'whatsapp', widget: 'string' }
              ]
            }
          ]
        }
      ]
    };
  </script>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
</body>
</html>
