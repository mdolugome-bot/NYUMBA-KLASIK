<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyumba Klasik - Admin</title>
</head>
<body>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <script>
    // Force CMS to use GitHub backend
    window.CMS_MANUAL_INIT = true;
    CMS.init({
      backend: {
        name: 'github',
        repo: 'mdolugome-bot/NYUMBA-KLASIK',
        branch: 'main',
      },
      media_folder: 'images',
      public_folder: '/images',
      collections: [
        {
          name: 'site',
          label: 'Website Content',
          files: [
            {
              file: 'site.json',
              label: 'Main Settings',
              name: 'settings',
              fields: [
                { name: 'title', label: 'Site Title', widget: 'string' },
                { name: 'description', label: 'Meta Description', widget: 'text' },
                { name: 'keywords', label: 'Meta Keywords', widget: 'string' },
                { name: 'email', label: 'Email', widget: 'string' },
                { name: 'phone', label: 'Phone', widget: 'string' },
                { name: 'whatsapp', label: 'WhatsApp Number', widget: 'string' }
              ]
            }
          ]
        }
      ]
    });
  </script>
</body>
</html>
